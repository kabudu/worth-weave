name: Bug report
description: Report a reproducible Worthweave defect using sanitized information.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Privacy warning:** never attach real broker exports, databases, backups, credentials, account identifiers, or portfolio screenshots. Use synthetic data only. Report security vulnerabilities through SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Worthweave version
      description: Release tag or commit hash.
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS and Mac
      placeholder: macOS 15.5, Apple M2, 16 GB
    validations:
      required: true
  - type: dropdown
    id: broker
    attributes:
      label: Broker
      options: [Not broker-specific, Trading 212, Interactive Brokers, Robinhood]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic values and fixtures.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed credentials, account identifiers, personal data, and real financial values.
          required: true
