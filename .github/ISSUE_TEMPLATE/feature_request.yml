name: Feature request
description: Propose a reporting or workflow improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or decision
      description: What portfolio decision or workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the result rather than prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: data
    attributes:
      label: Required data
      description: Which broker exports, prices, FX rates, or classifications might support it? Do not attach real financial data.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: This request does not require sharing real broker or portfolio data.
          required: true
