name: macOS release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional existing GitHub release tag to receive the artifacts.
        required: false
        type: string
  release:
    types: [published]

concurrency:
  group: macos-release-${{ github.event.release.tag_name || inputs.release_tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  signed-release:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY || secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID || secrets.APPLE_TEAM_ID }}

    steps:
      - name: Resolve release ref
        id: release
        env:
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag="$EVENT_RELEASE_TAG"
          else
            tag="$INPUT_RELEASE_TAG"
          fi
          if [[ -n "$tag" ]]; then
            echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.ref }}
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Validate release credentials
        shell: bash
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE:?APPLE_CERTIFICATE must be configured}"
          : "${APPLE_CERTIFICATE_PASSWORD:?APPLE_CERTIFICATE_PASSWORD must be configured}"
          : "${APPLE_SIGNING_IDENTITY:?APPLE_SIGNING_IDENTITY must be configured}"
          : "${APPLE_ID:?APPLE_ID must be configured}"
          : "${APPLE_PASSWORD:?APPLE_PASSWORD must be configured}"
          : "${APPLE_TEAM_ID:?APPLE_TEAM_ID must be configured}"
          xcrun notarytool history \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" >/dev/null

      - name: Import Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/worthweave-developer-id.p12"
          keychain_path="$RUNNER_TEMP/worthweave-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"
          rm -f "$cert_path"

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Run release tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test --manifest-path src-tauri/Cargo.toml --locked
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings
          pnpm --dir frontend test
          pnpm --dir frontend lint

      - name: Build, sign, and notarize
        run: pnpm --dir frontend exec tauri build --ci

      - name: Verify signed and notarized artifacts
        shell: bash
        run: |
          set -euo pipefail
          app="src-tauri/target/release/bundle/macos/Worthweave.app"
          dmg="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -d "$app"
          test -n "$dmg"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign_details="$(codesign --display --verbose=4 "$app" 2>&1)"
          grep -F "Authority=$APPLE_SIGNING_IDENTITY" <<<"$codesign_details"
          grep -F "flags=0x10000(runtime)" <<<"$codesign_details"
          spctl --assess --type execute --verbose=2 "$app"
          xcrun stapler validate "$app"
          xcrun stapler validate "$dmg"
          hdiutil verify "$dmg"
          shasum -a 256 "$dmg" > "${dmg}.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worthweave-macos-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.sha256

      - name: Upload artifacts to GitHub release
        if: steps.release.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ steps.release.outputs.tag }}" \
            src-tauri/target/release/bundle/dmg/*.dmg \
            src-tauri/target/release/bundle/dmg/*.sha256 \
            --clobber
