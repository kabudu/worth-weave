name: macOS release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional existing vMAJOR.MINOR.PATCH tag to publish; leave blank for workflow artifacts only.
        required: false
        type: string

concurrency:
  group: macos-release-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  signed-release:
    permissions:
      contents: write
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY || secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID || secrets.APPLE_TEAM_ID }}

    steps:
      - name: Resolve release ref
        id: release
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="$INPUT_RELEASE_TAG"
          fi
          if [[ -n "$tag" ]]; then
            echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.release.outputs.ref }}
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.32.1
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target

      - name: Validate release credentials
        shell: bash
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE:?APPLE_CERTIFICATE must be configured}"
          : "${APPLE_CERTIFICATE_PASSWORD:?APPLE_CERTIFICATE_PASSWORD must be configured}"
          : "${APPLE_SIGNING_IDENTITY:?APPLE_SIGNING_IDENTITY must be configured}"
          : "${APPLE_ID:?APPLE_ID must be configured}"
          : "${APPLE_PASSWORD:?APPLE_PASSWORD must be configured}"
          : "${APPLE_TEAM_ID:?APPLE_TEAM_ID must be configured}"
          xcrun notarytool history \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" >/dev/null

      - name: Import Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/worthweave-developer-id.p12"
          keychain_path="$RUNNER_TEMP/worthweave-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"
          rm -f "$cert_path"

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --dir frontend exec playwright install chromium

      - name: Validate release metadata
        run: ./scripts/check-release.sh "${{ steps.release.outputs.tag }}"

      - name: Run release tests
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --manifest-path src-tauri/Cargo.toml --check
          cargo test --manifest-path src-tauri/Cargo.toml --locked
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings
          cargo install cargo-audit --version 0.22.1 --locked
          cargo audit --file src-tauri/Cargo.lock
          pnpm --dir frontend test
          pnpm --dir frontend lint
          pnpm --dir frontend build
          pnpm --dir frontend audit --prod
          pnpm --dir frontend test:e2e

      - name: Build, sign, and notarize
        run: frontend/node_modules/.bin/tauri build --ci

      - name: Verify signed and notarized artifacts
        shell: bash
        run: |
          set -euo pipefail
          app="src-tauri/target/release/bundle/macos/Worthweave.app"
          dmg="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -d "$app"
          test -n "$dmg"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign_details="$(codesign --display --verbose=4 "$app" 2>&1)"
          grep -F "Authority=$APPLE_SIGNING_IDENTITY" <<<"$codesign_details"
          grep -F "flags=0x10000(runtime)" <<<"$codesign_details"
          spctl --assess --type execute --verbose=2 "$app"
          xcrun stapler validate "$app"
          xcrun stapler validate "$dmg"
          hdiutil verify "$dmg"
          shasum -a 256 "$dmg" > "${dmg}.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: worthweave-macos-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.sha256

      - name: Create GitHub release and upload artifacts
        if: steps.release.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          notes="$RUNNER_TEMP/release-notes.md"
          scripts/extract-release-notes.sh "${{ steps.release.outputs.tag }}" > "$notes"
          if ! gh release view "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            gh release create "${{ steps.release.outputs.tag }}" \
              --verify-tag \
              --title "Worthweave ${{ steps.release.outputs.tag }}" \
              --notes-file "$notes"
          fi
          gh release upload "${{ steps.release.outputs.tag }}" \
            src-tauri/target/release/bundle/dmg/*.dmg \
            src-tauri/target/release/bundle/dmg/*.sha256 \
            --clobber
